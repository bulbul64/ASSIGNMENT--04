<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] ">
    <header class="container mx-auto md:px-15 px-5 sticky top-0 z-10">
        <section class="bg-white py-4 px-4 md:px-6 rounded-b-lg shadow">
            <h1 class="text-[#002C5C] font-bold text-3xl mb-4">Job Application Tracker</h1>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-white py-4 px-4 rounded shadow-sm">
                    <h2 class="text-gray-500 text-sm">Total</h2>
                    <p id="total-count" class="text-[#002C5C] font-bold text-xl mt-1">0</p>
                </div>
                <div class="bg-white py-4 px-4 rounded shadow-sm">
                    <h2 class="text-gray-500 text-sm">Interview</h2>
                    <p id="interview-count" class="text-[#10B981] font-bold text-xl mt-1">0</p>
                </div>
                <div class="bg-white py-4 px-4 rounded shadow-sm">
                    <h2 class="text-gray-500 text-sm">Rejected</h2>
                    <p id="rejected-count" class="text-[#EF4444] font-bold text-xl mt-1">0</p>
                </div>
            </div>
        </section>
        <div class="flex items-center justify-between pt-5  bg-[#F8FAFC] py-2 px-2 md:px-2">
            <h2 class="text-[#002C5C] font-bold text-2xl">Available Jobs</h2>
            <p><span id="job-length" class="font-semibold">0</span> jobs</p>
        </div>
        <div class="flex gap-2 py-3   bg-[#F8FAFC]">
            <button id="all-jobs" class="btn btn-primary">All</button>
            <button id="interview" class="btn">Interview</button>
            <button id="rejected" class="btn">Rejected</button>
        </div>
       
    </header>

    <main class="container mx-auto md:px-15 px-5 mt-4 ">
        <section id="jobs-container" class="bg-white space-y-4 ">
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
